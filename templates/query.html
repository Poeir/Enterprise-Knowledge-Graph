<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ค้นหา - Enterprise Knowledge Graph</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        header {
            background: white;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        header h1 {
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            background: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        
        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .tab-btn:hover {
            transform: translateY(-2px);
        }
        
        .tab-content {
            display: none;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .tab-content.active {
            display: block;
        }
        
        .search-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .search-form input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }
        
        .search-form button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
        }
        
        .search-form button:hover {
            transform: translateY(-2px);
        }
        
        .results {
            margin-top: 20px;
        }
        
        .result-card {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }
        
        .result-card h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .result-card p {
            margin: 5px 0;
            color: #666;
        }
        
        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        
        .skill-badge {
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9em;
        }
        
        .loading {
            text-align: center;
            color: #666;
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
        
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: white;
            text-decoration: none;
            font-size: 1em;
        }
        
        .back-btn:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> กลับหน้าหลัก</a>
        
        <header>
            <h1><i class="fas fa-search"></i> ค้นหาข้อมูล</h1>
        </header>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(0)">
                <i class="fas fa-user"></i> ค้นหาพนักงาน
            </button>
            <button class="tab-btn" onclick="switchTab(1)">
                <i class="fas fa-graduation-cap"></i> ค้นหาทักษะ
            </button>
            <button class="tab-btn" onclick="switchTab(2)">
                <i class="fas fa-tickets"></i> ค้นหาทิกเก็ต
            </button>
        </div>
        
        <!-- Tab 1: Search Employee -->
        <div id="tab0" class="tab-content active">
            <h2>ค้นหาพนักงาน</h2>
            <div class="search-form">
                <input type="text" id="empId" placeholder="กรอก Employee ID (เช่น EMP001)">
                <button onclick="searchEmployee()">ค้นหา</button>
            </div>
            <div id="empResults" class="results"></div>
        </div>
        
        <!-- Tab 2: Search Skill -->
        <div id="tab1" class="tab-content">
            <h2>ค้นหาตามทักษะ</h2>
            <div class="search-form">
                <input type="text" id="skillName" placeholder="กรอกชื่อทักษะ">
                <button onclick="searchSkill()">ค้นหา</button>
            </div>
            <div id="skillResults" class="results"></div>
        </div>
        
        <!-- Tab 3: Search Ticket -->
        <div id="tab2" class="tab-content">
            <h2>ค้นหาพนักงานสำหรับทิกเก็ต</h2>
            <div class="search-form">
                <input type="text" id="ticketId" placeholder="กรอก Ticket ID (เช่น TKT001)">
                <button onclick="searchTicket()">ค้นหา</button>
            </div>
            <div id="ticketResults" class="results"></div>
        </div>
    </div>
    
    <script>
        function switchTab(tabNum) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            // Show selected tab
            document.getElementById(`tab${tabNum}`).classList.add('active');
            document.querySelectorAll('.tab-btn')[tabNum].classList.add('active');
        }
        
        function showLoading(elementId) {
            document.getElementById(elementId).innerHTML = '<div class="loading"><i class="fas fa-spinner"></i> กำลังค้นหา...</div>';
        }
        
        function searchEmployee() {
            const empId = document.getElementById('empId').value.trim();
            if (!empId) {
                document.getElementById('empResults').innerHTML = '<div class="error">กรุณากรอก Employee ID</div>';
                return;
            }
            
            showLoading('empResults');
            
            fetch('/api/search-employee', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({emp_id: empId})
            })
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    document.getElementById('empResults').innerHTML = `<div class="error">${data.error}</div>`;
                } else {
                    let html = `<div class="result-card">
                        <h3>${data.name} (${data.emp_id})</h3>
                        <p><strong>แผนก:</strong> ${data.department}</p>
                        <p><strong>จำนวนทักษะ:</strong> ${data.skill_count}</p>
                        <div class="skills">`;
                    data.skills.forEach(skill => {
                        html += `<span class="skill-badge">${skill}</span>`;
                    });
                    html += '</div></div>';
                    document.getElementById('empResults').innerHTML = html;
                }
            });
        }
        
        function searchSkill() {
            const skillName = document.getElementById('skillName').value.trim();
            if (!skillName) {
                document.getElementById('skillResults').innerHTML = '<div class="error">กรุณากรอกชื่อทักษะ</div>';
                return;
            }
            
            showLoading('skillResults');
            
            fetch('/api/search-skill', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({skill_name: skillName})
            })
            .then(r => r.json())
            .then(data => {
                let html = '';
                if (data.employees.length === 0) {
                    html = '<div class="error">ไม่พบพนักงานที่มีทักษะนี้</div>';
                } else {
                    data.employees.forEach(emp => {
                        html += `<div class="result-card">
                            <h3>${emp.name} (${emp.emp_id})</h3>
                            <p><strong>แผนก:</strong> ${emp.department}</p>
                            <div class="skills">`;
                        emp.skills.forEach(skill => {
                            html += `<span class="skill-badge">${skill}</span>`;
                        });
                        html += '</div></div>';
                    });
                }
                document.getElementById('skillResults').innerHTML = html;
            });
        }
        
        function searchTicket() {
            const ticketId = document.getElementById('ticketId').value.trim();
            if (!ticketId) {
                document.getElementById('ticketResults').innerHTML = '<div class="error">กรุณากรอก Ticket ID</div>';
                return;
            }
            
            showLoading('ticketResults');
            
            fetch('/api/search-ticket', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ticket_id: ticketId})
            })
            .then(r => r.json())
            .then(data => {
                let html = '';
                if (data.employees.length === 0) {
                    html = '<div class="error">ไม่พบพนักงาน</div>';
                } else {
                    data.employees.forEach(emp => {
                        let coverageColor = emp.coverage === 'ทั้งหมด' ? '#0a0' : (emp.coverage === 'บางส่วน' ? '#f90' : '#c33');
                        html += `<div class="result-card">
                            <h3>${emp.name} (${emp.emp_id})</h3>
                            <p><strong>แผนก:</strong> ${emp.department}</p>
                            <p><strong>ทักษะที่ตรง:</strong> ${emp.matching_skills}/${emp.required_skills}</p>
                            <p><strong style="color: ${coverageColor}">ครอบคลุม: ${emp.coverage}</strong></p>
                        </div>`;
                    });
                }
                document.getElementById('ticketResults').innerHTML = html;
            });
        }
    </script>
</body>
</html>
