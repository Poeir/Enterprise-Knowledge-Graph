<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Visualization - Enterprise Knowledge Graph</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.23.0/cytoscape.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        header {
            background: white;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        header h1 {
            color: #667eea;
            font-size: 1.8em;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .header-info {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .back-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: #764ba2;
            transform: translateX(-5px);
        }
        
        .container {
            display: flex;
            height: calc(100vh - 80px);
        }
        
        .canvas-area {
            flex: 1;
            position: relative;
        }
        
        #cy {
            width: 100%;
            height: 100%;
            background: white;
        }
        
        .sidebar {
            width: 300px;
            background: white;
            padding: 20px;
            overflow-y: auto;
            box-shadow: -5px 0 15px rgba(0, 0, 0, 0.1);
        }
        
        .sidebar h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.2em;
        }
        
        .legend {
            margin-bottom: 20px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 5px;
        }
        
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }
        
        .employee-color {
            background: #667eea;
        }
        
        .skill-color {
            background: #00d084;
        }
        
        .ticket-color {
            background: #ff6b6b;
        }
        
        .stats {
            background: #f5f7ff;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        
        .stat {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #ddd;
        }
        
        .stat:last-child {
            border-bottom: none;
        }
        
        .stat-label {
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-value {
            color: #333;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .btn-small {
            flex: 1;
            padding: 8px 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }
        
        .btn-small:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <header>
        <h1><i class="fas fa-project-diagram"></i> Graph Visualization</h1>
        <div class="header-info">
            <a href="/" class="back-btn">
                <i class="fas fa-arrow-left"></i> กลับหน้าหลัก
            </a>
        </div>
    </header>
    
    <div class="container">
        <div class="canvas-area">
            <div id="cy"></div>
        </div>
        
        <div class="sidebar">
            <h2>📊 Graph Info</h2>
            
            <div class="controls">
                <button class="btn-small" onclick="fitGraph()">
                    <i class="fas fa-expand"></i> Fit View
                </button>
                <button class="btn-small" onclick="resetLayout()">
                    <i class="fas fa-sync"></i> Reset
                </button>
            </div>
            
            <h3 style="color: #667eea; margin-top: 15px;">Legend</h3>
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color employee-color"></div>
                    <span>Employee</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color skill-color"></div>
                    <span>Skill</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color ticket-color"></div>
                    <span>Ticket</span>
                </div>
            </div>
            
            <div class="stats">
                <div class="stat">
                    <span class="stat-label">Nodes:</span>
                    <span class="stat-value" id="nodeCount">-</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Edges:</span>
                    <span class="stat-value" id="edgeCount">-</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Status:</span>
                    <span class="stat-value" id="status">Loading...</span>
                </div>
            </div>
            
            <div id="nodeDetails" style="margin-top: 20px; display: none;">
                <h3 style="color: #667eea;">Node Details</h3>
                <div id="detailsContent" style="background: #f5f5f5; padding: 10px; border-radius: 5px; margin-top: 10px;"></div>
            </div>
        </div>
    </div>
    
    <script>
        let cy;
        
        function initGraph() {
            fetch('/api/graph-data')
                .then(r => r.json())
                .then(data => {
                    const elements = [];
                    
                    // Add nodes
                    data.nodes.forEach(node => {
                        elements.push({
                            data: {
                                id: node.id,
                                label: node.label,
                                type: node.type
                            }
                        });
                    });
                    
                    // Add edges
                    data.edges.forEach(edge => {
                        elements.push({
                            data: {
                                source: edge.source,
                                target: edge.target,
                                label: edge.type
                            }
                        });
                    });
                    
                    // Initialize Cytoscape
                    cy = cytoscape({
                        container: document.getElementById('cy'),
                        elements: elements,
                        style: [
                            {
                                selector: 'node',
                                style: {
                                    'content': 'data(label)',
                                    'text-valign': 'center',
                                    'text-halign': 'center',
                                    'background-color': function(ele) {
                                        const type = ele.data('type');
                                        if (type === 'employee') return '#667eea';
                                        if (type === 'skill') return '#00d084';
                                        if (type === 'ticket') return '#ff6b6b';
                                        return '#999';
                                    },
                                    'width': 60,
                                    'height': 60,
                                    'font-size': 11,
                                    'color': 'white',
                                    'font-weight': 'bold',
                                    'border-width': 2,
                                    'border-color': '#fff'
                                }
                            },
                            {
                                selector: 'edge',
                                style: {
                                    'line-color': '#ccc',
                                    'target-arrow-color': '#ccc',
                                    'target-arrow-shape': 'triangle',
                                    'width': 2,
                                    'curve-style': 'bezier'
                                }
                            },
                            {
                                selector: 'node:selected',
                                style: {
                                    'border-width': 4,
                                    'border-color': '#ffeb3b'
                                }
                            }
                        ],
                        layout: {
                            name: 'cose',
                            animate: true,
                            animationDuration: 500,
                            avoidOverlap: true,
                            nodeSpacing: 10
                        }
                    });
                    
                    // Add click handler
                    cy.on('tap', 'node', function(event) {
                        const node = event.target;
                        showNodeDetails(node);
                    });
                    
                    // Update statistics
                    document.getElementById('nodeCount').textContent = data.nodes.length;
                    document.getElementById('edgeCount').textContent = data.edges.length;
                    document.getElementById('status').textContent = 'Ready';
                })
                .catch(err => {
                    console.error('Error loading graph:', err);
                    document.getElementById('status').textContent = 'Error loading graph';
                });
        }
        
        function showNodeDetails(node) {
            const details = document.getElementById('nodeDetails');
            const content = document.getElementById('detailsContent');
            
            const typeEmoji = {
                'employee': '👤',
                'skill': '💡',
                'ticket': '📋'
            };
            
            const html = `
                <p><strong>Type:</strong> ${typeEmoji[node.data('type')] || '●'} ${node.data('type')}</p>
                <p><strong>Label:</strong> ${node.data('label')}</p>
                <p><strong>ID:</strong> ${node.id()}</p>
                <p><strong>Connections:</strong> ${node.degree()}</p>
            `;
            
            content.innerHTML = html;
            details.style.display = 'block';
        }
        
        function fitGraph() {
            if (cy) cy.fit();
        }
        
        function resetLayout() {
            if (cy) {
                cy.layout({
                    name: 'cose',
                    animate: true,
                    animationDuration: 500
                }).run();
            }
        }
        
        // Initialize on load
        window.addEventListener('load', initGraph);
    </script>
</body>
</html>
